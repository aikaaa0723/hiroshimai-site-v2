<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(!(window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches))document.documentElement.classList.add("anim");</script>
  <title>CEOメッセージ | HiroshimAI株式会社</title>
  <meta name="description" content="HiroshimAI株式会社 代表取締役 住田隆真からのメッセージと経歴。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="app-header"></div>

  <main>
    <section class="page-hero">
      <div class="page-hero-inner">
        <h1>Message</h1>
        <p class="page-jp">CEOメッセージ</p>
      </div>
    </section>
    <nav class="breadcrumb" aria-label="パンくず">
      <ol>
        <li><a href="../index.html">ホーム</a></li>
        <li><a href="index.html">会社情報</a></li>
        <li>CEOメッセージ</li>
      </ol>
    </nav>

    <section class="company" style="margin-top:0">
      <div class="company-inner">
        <div class="rep-photo has-img">
          <img src="../assets/ceo.png" alt="代表取締役 住田 隆真" />
        </div>
        <div class="rep-body">
          <!-- ▼▼▼ 代表メッセージ：本人から受領後にここへ記載 ▼▼▼
               肩書・経歴は本人確認が取れるまで記載しない方針。
               受領したら下の .rep-placeholder を差し替えてください。
               例) <p class="rep-lead">（見出し）</p>
                   <p class="rep-text">（本文）</p>
          -->
          <p class="rep-lead rep-placeholder">メッセージは準備中です。</p>
          <div class="rep-name">
            <span class="rep-fullname">住田 隆真</span>
          </div>
          <!-- ▲▲▲ ここまで差し替え範囲 ▲▲▲ -->
        </div>
      </div>
    </section>

    <section class="contact">
      <h2 class="contact-title">まずは、お気軽にご相談を。</h2>
      <p class="contact-lead">代表が直接、御社のAI活用についてお話しします。</p>
      <a href="../contact.html" class="contact-btn">お問い合わせ・無料相談</a>
    </section>
  </main>

  <div id="app-footer"></div>
  <script>window.SITE_ROOT = "../";</script>
  <script src="../js/layout.js"></script>
</body>
</html>
